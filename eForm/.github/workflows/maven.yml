name: Java CI with Maven
on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main", "dev" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Compile with Maven
      run: mvn -B compile --file pom.xml

    - name: Run Integration Tests
      run: mvn -B test --file pom.xml

    - name: Run Dedicated Logic Verification
      if: always()
      run: mvn -B test -Dtest=APICustomLogicIntTest -DfailIfNoTests=false "-Dmodernizer.skip=true" "-Denforcer.skip=true" --file pom.xml

    - name: Publish API Logic Details to Job Summary
      if: always()
      run: |
        if [ -f target/api-test-results.md ]; then
          cat target/api-test-results.md >> $GITHUB_STEP_SUMMARY
        else
          echo "### ⚠️ No API logic report found." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: success() || failure()
      with:
        report_paths: '**/target/surefire-reports/TEST-*.xml'

    - name: Upload Test Results Artifact
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: test-results
        path: '**/target/surefire-reports/*.xml'

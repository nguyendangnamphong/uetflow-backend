
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: uetflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - uetflow-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  eaccount:
    image: eaccount:latest
    container_name: uetflow-eaccount
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/eaccount?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JHIPSTER_CORS_ALLOWED_ORIGINS: 'http://localhost:5173,http://localhost:8080,http://localhost:3000,http://localhost:4200'
      JHIPSTER_CORS_ALLOWED_METHODS: '*'
      JHIPSTER_CORS_ALLOWED_HEADERS: '*'
      JHIPSTER_CORS_ALLOW_CREDENTIALS: 'true'
      JHIPSTER_CORS_MAX_AGE: '1800'
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - uetflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/management/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  eform:
    image: eform-be:latest
    container_name: uetflow-eform
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/eform?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JHIPSTER_CORS_ALLOWED_ORIGINS: 'http://localhost:5173,http://localhost:8080,http://localhost:3000,http://localhost:4200'
      JHIPSTER_CORS_ALLOWED_METHODS: '*'
      JHIPSTER_CORS_ALLOWED_HEADERS: '*'
      JHIPSTER_CORS_ALLOW_CREDENTIALS: 'true'
      JHIPSTER_CORS_MAX_AGE: '1800'
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - uetflow-net
    healthcheck:
      disable: true

  eflow:
    image: eflow:latest
    container_name: uetflow-eflow
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/eflow?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JHIPSTER_CORS_ALLOWED_ORIGINS: 'http://localhost:5173,http://localhost:8080,http://localhost:3000,http://localhost:4200'
      JHIPSTER_CORS_ALLOWED_METHODS: '*'
      JHIPSTER_CORS_ALLOWED_HEADERS: '*'
      JHIPSTER_CORS_ALLOW_CREDENTIALS: 'true'
      JHIPSTER_CORS_MAX_AGE: '1800'
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - uetflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/management/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  erequest:
    image: erequest:latest
    container_name: uetflow-erequest
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/erequest?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JHIPSTER_CORS_ALLOWED_ORIGINS: '*'
      JHIPSTER_CORS_ALLOWED_METHODS: '*'
      JHIPSTER_CORS_ALLOWED_HEADERS: '*'
      JHIPSTER_CORS_ALLOW_CREDENTIALS: 'false'
      JHIPSTER_CORS_MAX_AGE: '1800'
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - uetflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/management/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  eai:
    image: docform:latest
    container_name: uetflow-eai
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/docform?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JHIPSTER_CORS_ALLOWED_ORIGINS: 'http://localhost:5173,http://localhost:8080,http://localhost:3000,http://localhost:4200'
      JHIPSTER_CORS_ALLOWED_METHODS: '*'
      JHIPSTER_CORS_ALLOWED_HEADERS: '*'
      JHIPSTER_CORS_ALLOW_CREDENTIALS: 'true'
      JHIPSTER_CORS_MAX_AGE: '1800'
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy}
      GEMINI_API_MODEL: gemini-flash-lite-latest
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - uetflow-net
    healthcheck:
      disable: true

  nginx:
    image: nginx:alpine
    container_name: uetflow-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - erequest
      - eaccount
      - eform
      - eflow
      - eai
    networks:
      - uetflow-net

networks:
  uetflow-net:
    driver: bridge

volumes:
  mysql_data:

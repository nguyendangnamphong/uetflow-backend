services:
  - name: mysql
    type: pserv
    runtime: image
    image:
      url: mysql/mysql-server:8.0
    plan: starter
    envVars:
      - key: MYSQL_DATABASE
        value: uetflow
      - key: MYSQL_USER
        value: uetflow
      - key: MYSQL_PASSWORD
        value: uetflow
      - key: MYSQL_ROOT_PASSWORD
        value: uetflow
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - name: eaccount
    type: web
    runtime: docker
    rootDir: eAccount
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql:3306/eaccount?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: uetflow
      - key: JHIPSTER_CORS_ALLOWED_ORIGINS
        value: https://datawarehouse-subject.web.app
      - key: JHIPSTER_CORS_ALLOWED_METHODS
        value: "*"
      - key: JHIPSTER_CORS_ALLOWED_HEADERS
        value: "*"
      - key: JHIPSTER_CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: JHIPSTER_CORS_MAX_AGE
        value: "1800"
    healthCheckPath: /management/health

  - name: eform
    type: web
    runtime: docker
    rootDir: eForm
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql:3306/eform?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: uetflow
      - key: JHIPSTER_CORS_ALLOWED_ORIGINS
        value: https://datawarehouse-subject.web.app
      - key: JHIPSTER_CORS_ALLOWED_METHODS
        value: "*"
      - key: JHIPSTER_CORS_ALLOWED_HEADERS
        value: "*"
      - key: JHIPSTER_CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: JHIPSTER_CORS_MAX_AGE
        value: "1800"
    healthCheckPath: /management/health

  - name: eflow
    type: web
    runtime: docker
    rootDir: eFlow
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql:3306/eflow?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: uetflow
      - key: JHIPSTER_CORS_ALLOWED_ORIGINS
        value: https://datawarehouse-subject.web.app
      - key: JHIPSTER_CORS_ALLOWED_METHODS
        value: "*"
      - key: JHIPSTER_CORS_ALLOWED_HEADERS
        value: "*"
      - key: JHIPSTER_CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: JHIPSTER_CORS_MAX_AGE
        value: "1800"
    healthCheckPath: /management/health

  - name: erequest
    type: web
    runtime: docker
    rootDir: eRequest
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql:3306/erequest?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: uetflow
      - key: JHIPSTER_CORS_ALLOWED_ORIGINS
        value: https://datawarehouse-subject.web.app
      - key: JHIPSTER_CORS_ALLOWED_METHODS
        value: "*"
      - key: JHIPSTER_CORS_ALLOWED_HEADERS
        value: "*"
      - key: JHIPSTER_CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: JHIPSTER_CORS_MAX_AGE
        value: "1800"
    healthCheckPath: /management/health

  - name: eai
    type: web
    runtime: docker
    rootDir: eAi
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql:3306/docform?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: uetflow
      - key: JHIPSTER_CORS_ALLOWED_ORIGINS
        value: https://datawarehouse-subject.web.app
      - key: JHIPSTER_CORS_ALLOWED_METHODS
        value: "*"
      - key: JHIPSTER_CORS_ALLOWED_HEADERS
        value: "*"
      - key: JHIPSTER_CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: JHIPSTER_CORS_MAX_AGE
        value: "1800"
      - key: GEMINI_API_KEY
        value: dummy
      - key: GEMINI_API_MODEL
        value: gemini-flash-lite-latest
    healthCheckPath: /management/health

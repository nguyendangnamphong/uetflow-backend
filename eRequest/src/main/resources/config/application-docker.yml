logging:
  level:
    ROOT: INFO
    tech.jhipster: INFO
    com.mycompany.erequest: INFO

spring:
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  docker:
    compose:
      enabled: false
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://mysql:3306/erequest?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      poolName: Hikari
      auto-commit: false
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
  liquibase:
    contexts: prod
  thymeleaf:
    cache: true
  mail:
    host: localhost
    port: 25
    username:
    password:

server:
  port: 8084
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024
  forward-headers-strategy: native

jhipster:
  http:
    cache:
      timeToLiveInDays: 1461
  cache:
    ehcache:
      time-to-live-seconds: 3600
      max-entries: 1000
  cors:
    allowed-origins: '*'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-eRequestApp-alert,X-eRequestApp-error,X-eRequestApp-params'
    allow-credentials: false
    max-age: 1800
  security:
    authentication:
      jwt:
        base64-secret: NTA1MjQzNWYxNzAzODdiNmFiNDliYTIwMzFhZjAwOWFjNmU3MTgzNDQwZTdlZTM3YzI0NzQwYmM3ZWUyNTI2NTgwNTlhYjAwZTQ2ZDg2ZjUzOWY5NmU2ZTJlMTRkNDg0OWMxMmZhNmM4YzY1MzIzNWUxOGEyMzU0ODFmNDc4MmQ=
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  logging:
    use-json-format: false
    logstash:
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512

application:
  client:
    eaccount:
      url: http://eaccount:8081
    eform:
      url: http://eform:8082
    eflow:
      url: http://eflow:8083

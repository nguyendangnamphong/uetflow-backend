name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Verify Environment and Port Configurations
      run: |
        echo "Checking application-dev.yml for correct MySQL port (3362)"
        grep "3362" src/main/resources/config/application-dev.yml || (echo "DB Port 3362 not found in dev profile!" && exit 1)
        echo "Checking docker-compose mysql exposed port (3362)"
        grep "3362:3306" src/main/docker/mysql.yml || (echo "Docker MySQL Port 3362 not found!" && exit 1)

    - name: Make mvnw executable
      run: chmod +x mvnw

    - name: Build Project
      run: ./mvnw clean compile -DskipTests

    - name: Test API Logic
      run: ./mvnw test -Dtest=APICustomLogicIntTest

    - name: Publish API Test Results
      if: always()
      run: |
        if [ -f target/api-test-results.md ]; then
          cat target/api-test-results.md >> $GITHUB_STEP_SUMMARY
        else
          echo "No API results table found." >> $GITHUB_STEP_SUMMARY
        fi

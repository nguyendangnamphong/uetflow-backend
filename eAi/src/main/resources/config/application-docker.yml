logging:
  level:
    ROOT: INFO
    tech.jhipster: INFO
    com.vnu.uet: INFO

spring:
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  docker:
    compose:
      enabled: false
  cloud:
    consul:
      enabled: false
      config:
        enabled: false
      discovery:
        enabled: false
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://mysql:3306/docform?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      poolName: Hikari
      auto-commit: false
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
  liquibase:
    contexts: prod
  thymeleaf:
    cache: true

server:
  port: 8085
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024
  forward-headers-strategy: native

jhipster:
  cache:
    hazelcast:
      time-to-live-seconds: 3600
      backup-count: 1
  security:
    authentication:
      jwt:
        base64-secret: OGYyZGJmZWU2Zjc4YWJkNzVkZDgwNWNiMTk1ZmJmMTk1Yzg4ZGRiMzlkY2ExMTA4OTk2MDE4NjM1NjhhMjY2YTU1MGEwN2U3Mzk2MDIwODk1ZmY3ZGY4MTA3NjM4YWNmZjkzZjdlMTY2ZWQyYjk2NTcxNjRlMDNkZTQ2MGQ1Y2Y=
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  logging:
    use-json-format: false
    logstash:
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512

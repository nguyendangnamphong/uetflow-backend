version: '3.8'

services:
  # ===============================================
  # Database Service
  # ===============================================
  erequest-mysql:
    image: mysql:9.1.0
    container_name: erequest-mysql
    volumes:
      - ./src/main/docker/config/mysql:/etc/mysql/conf.d
      - erequest-mysql-data:/var/lib/mysql
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_DATABASE=erequest
    ports:
      # Expose with custom port 3362 to avoid conflict
      - "3362:3306"
    command: mysqld --lower_case_table_names=1 --skip-mysqlx --character_set_server=utf8mb4 --explicit_defaults_for_timestamp
    healthcheck:
      test: ['CMD', 'mysql', '-e', 'SHOW DATABASES;']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - erequest-networks

  # ===============================================
  # eRequest Application Service
  # ===============================================
  erequest-app:
    # Requires running `./mvnw -Pprod verify jib:dockerBuild` first to generate the image
    image: erequest:latest
    container_name: erequest-app
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod,api-docs
      # Connect to internal docker MySQL port (3306)
      - SPRING_DATASOURCE_URL=jdbc:mysql://erequest-mysql:3306/erequest?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
      - SPRING_LIQUIBASE_URL=jdbc:mysql://erequest-mysql:3306/erequest?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
      # Feign clients URLs mapping to other docker containers (can be changed later)
      - APPLICATION_CLIENT_EACCOUNT_URL=http://eaccount-app:8081
      - APPLICATION_CLIENT_EFORM_URL=http://eform-app:8082
      - APPLICATION_CLIENT_EFLOW_URL=http://eflow-app:8083
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/management/health
      interval: 5s
      timeout: 5s
      retries: 40
    networks:
      - erequest-networks
    depends_on:
      erequest-mysql:
        condition: service_healthy

  # ===============================================
  # Other Microservices (eAccount, eForm, eFlow)
  # Uncomment and adjust paths/images as they become available
  # ===============================================
  # eaccount-app:
  #   image: eaccount:latest
  #   ports:
  #     - "8081:8081"
  #   networks:
  #     - erequest-networks
  
  # eform-app:
  #   image: eform:latest
  #   ports:
  #     - "8082:8082"
  #   networks:
  #     - erequest-networks

  # eflow-app:
  #   image: eflow:latest
  #   ports:
  #     - "8083:8083"
  #   networks:
  #     - erequest-networks

volumes:
  erequest-mysql-data:

networks:
  erequest-networks:
    driver: bridge

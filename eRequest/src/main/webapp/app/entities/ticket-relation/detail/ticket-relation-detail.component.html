<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (ticketRelation(); as ticketRelationRef) {
      <div>
        <h2 data-cy="ticketRelationDetailsHeading"><span jhiTranslate="eRequestApp.ticketRelation.detail.title">Ticket Relation</span></h2>

        <hr />

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ ticketRelationRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="eRequestApp.ticketRelation.relatedTicketId">Related Ticket Id</span></dt>
          <dd>
            <span>{{ ticketRelationRef.relatedTicketId }}</span>
          </dd>
          <dt><span jhiTranslate="eRequestApp.ticketRelation.ticket">Ticket</span></dt>
          <dd>
            @if (ticketRelation()!.ticket) {
              <div>
                <a [routerLink]="['/ticket', ticketRelation()!.ticket?.id, 'view']">{{ ticketRelationRef.ticket?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Quay lại</span>
        </button>

        <button type="button" [routerLink]="['/ticket-relation', ticketRelationRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Sửa</span>
        </button>
      </div>
    }
  </div>
</div>
